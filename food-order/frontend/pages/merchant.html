<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店家後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="/static/js/firebase-init.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<div x-data="merchantPage()" x-init="init()">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="text-gray-400 hover:text-orange-500 text-xl">←</a>
        <span class="font-bold text-gray-800">店家後台</span>
        <template x-if="store.name">
          <span class="text-sm text-gray-400" x-text="store.name"></span>
        </template>
      </div>
      <template x-if="store.store_id">
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <span class="text-sm text-gray-600" x-text="store.is_open ? '接單中' : '休息中'"></span>
          <div class="relative" @click="store.is_open = !store.is_open; toggleOpen()">
            <div class="w-10 h-6 rounded-full transition-colors" :class="store.is_open ? 'bg-green-500' : 'bg-gray-300'"></div>
            <div class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full shadow transition-transform" :class="store.is_open ? 'translate-x-4' : ''"></div>
          </div>
        </label>
      </template>
    </div>
  </nav>

  <!-- Tabs -->
  <div class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-4 flex gap-1 overflow-x-auto" style="scrollbar-width:none">
      <button @click="tab='orders'" :class="tab==='orders'?'border-b-2 border-orange-500 text-orange-500':'text-gray-500'" class="px-5 py-3 text-sm font-medium whitespace-nowrap">
        訂單管理
        <span x-show="pendingCount>0" class="ml-1 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full" x-text="pendingCount"></span>
      </button>
      <button @click="tab='inventory'; loadInventory()" :class="tab==='inventory'?'border-b-2 border-orange-500 text-orange-500':'text-gray-500'" class="px-5 py-3 text-sm font-medium whitespace-nowrap">品項狀態</button>
      <button @click="tab='menu'" :class="tab==='menu'?'border-b-2 border-orange-500 text-orange-500':'text-gray-500'" class="px-5 py-3 text-sm font-medium whitespace-nowrap">菜單管理</button>
      <button @click="tab='waitlist'; loadWaitlist()" :class="tab==='waitlist'?'border-b-2 border-orange-500 text-orange-500':'text-gray-500'" class="px-5 py-3 text-sm font-medium whitespace-nowrap">
        候補管理
        <span x-show="waitlistEntries.filter(w=>w.status==='waiting').length>0" class="ml-1 bg-blue-500 text-white text-xs px-1.5 py-0.5 rounded-full" x-text="waitlistEntries.filter(w=>w.status==='waiting').length"></span>
      </button>
      <button @click="tab='settings'" :class="tab==='settings'?'border-b-2 border-orange-500 text-orange-500':'text-gray-500'" class="px-5 py-3 text-sm font-medium whitespace-nowrap">店家設定</button>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-4 py-6">

    <div x-show="!store.store_id && !loading" class="text-center py-20">
      <p class="text-5xl mb-4">🏪</p>
      <p class="text-gray-600 mb-6">您還沒有店家，立即申請開店</p>
      <button @click="tab='settings'" class="bg-orange-500 text-white px-8 py-3 rounded-xl font-medium hover:bg-orange-600">申請開店</button>
    </div>

    <!-- ── 訂單管理 ── -->
    <div x-show="tab==='orders' && store.store_id">
      <div class="flex flex-wrap gap-2 mb-5 items-center">
        <template x-for="f in ['all','pending','accepted','preparing','ready','completed','cancelled']" :key="f">
          <button @click="orderFilter=f" :class="orderFilter===f?'bg-orange-500 text-white':'bg-white text-gray-600 border border-gray-200'"
            class="px-3 py-1.5 rounded-lg text-xs font-medium" x-text="filterLabel(f)"></button>
        </template>
        <div class="ml-auto flex items-center gap-1">
          <button @click="shiftOrderDate(-1)" class="w-7 h-7 border border-gray-200 rounded-lg text-gray-500 hover:bg-gray-100 text-sm">‹</button>
          <input type="date" x-model="orderDateFilter" @change="loadOrders()"
            class="border border-gray-200 rounded-xl px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-orange-300">
          <button @click="shiftOrderDate(1)" class="w-7 h-7 border border-gray-200 rounded-lg text-gray-500 hover:bg-gray-100 text-sm">›</button>
          <button x-show="orderDateFilter" @click="orderDateFilter=''; loadOrders()" class="text-xs text-gray-400 hover:text-red-400 ml-1">✕</button>
        </div>
      </div>

      <div x-show="ordersLoading" class="text-center py-12 text-gray-400">載入中...</div>
      <div x-show="!ordersLoading && filteredOrders.length===0" class="text-center py-12 text-gray-400">
        <p class="text-4xl mb-3">📋</p><p class="text-sm">沒有符合的訂單</p>
      </div>

      <div class="flex flex-col gap-4">
        <template x-for="order in filteredOrders" :key="order.order_id">
          <div class="bg-white rounded-2xl border shadow-sm p-5" :class="order.status==='pending'?'border-orange-300 ring-1 ring-orange-200':'border-gray-100'">
            <div class="flex items-start justify-between mb-3">
              <div>
                <p class="font-bold text-base" x-text="'#'+order.order_id.slice(-6).toUpperCase()"></p>
                <p class="text-xs text-gray-400" x-text="formatDate(order.created_at)"></p>
                <template x-if="order.pickup_date">
                  <p class="text-xs text-blue-500 mt-0.5" x-text="'取貨：'+order.pickup_date+' '+(order.pickup_hour!=null?order.pickup_hour+':00~'+(order.pickup_hour+1)+':00':'')"></p>
                </template>
              </div>
              <span class="text-xs font-bold px-3 py-1 rounded-full" :class="statusStyle(order.status).cls" x-text="statusStyle(order.status).label"></span>
            </div>
            <div class="bg-gray-50 rounded-xl p-3 mb-3 text-sm">
              <template x-for="item in order.items" :key="item.product_id">
                <div class="flex justify-between mb-1 text-gray-700">
                  <span x-text="item.product_name+' × '+item.qty"></span>
                  <span x-text="'$'+item.subtotal"></span>
                </div>
              </template>
              <template x-if="order.contact_name || order.contact_phone">
                <p class="text-xs text-gray-500 mt-2 border-t pt-2">
                  聯絡：<span x-text="(order.contact_name||'') + (order.contact_phone ? '  '+order.contact_phone : '')"></span>
                </p>
              </template>
              <template x-if="order.note">
                <p class="text-xs text-orange-500 mt-2 border-t pt-2" x-text="'備註：'+order.note"></p>
              </template>
              <div class="border-t pt-2 mt-2 flex justify-between font-bold">
                <span>合計</span><span class="text-orange-500" x-text="'$'+order.total_amount"></span>
              </div>
            </div>
            <div class="flex gap-2 flex-wrap">
              <template x-if="order.status==='pending'">
                <div class="flex gap-2 w-full">
                  <button @click="updateStatus(order,'accepted')" class="flex-1 bg-green-500 text-white py-2 rounded-xl text-sm font-medium hover:bg-green-600">✓ 接受</button>
                  <button @click="rejectOrder(order)" class="flex-1 bg-red-100 text-red-600 py-2 rounded-xl text-sm font-medium hover:bg-red-200">✕ 拒絕</button>
                </div>
              </template>
              <template x-if="order.status==='accepted'">
                <button @click="updateStatus(order,'preparing')" class="flex-1 bg-blue-500 text-white py-2 rounded-xl text-sm font-medium hover:bg-blue-600">開始製作</button>
              </template>
              <template x-if="order.status==='preparing'">
                <button @click="updateStatus(order,'ready')" class="flex-1 bg-purple-500 text-white py-2 rounded-xl text-sm font-medium hover:bg-purple-600">🔔 通知取餐</button>
              </template>
              <template x-if="order.status==='ready'">
                <button @click="updateStatus(order,'completed')" class="flex-1 bg-gray-700 text-white py-2 rounded-xl text-sm font-medium hover:bg-gray-800">完成取餐</button>
              </template>
              <template x-if="order.status==='cancel_requested'">
                <div class="w-full">
                  <p class="text-xs text-orange-500 mb-2">買家申請取消訂單</p>
                  <div class="flex gap-2">
                    <button @click="updateStatus(order,'cancelled')" class="flex-1 bg-red-100 text-red-600 py-2 rounded-xl text-sm hover:bg-red-200">同意取消</button>
                    <button @click="updateStatus(order,'accepted')" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl text-sm hover:bg-gray-200">拒絕取消</button>
                  </div>
                </div>
              </template>
              <template x-if="order.status==='cancelled'">
                <button @click="deleteOrder(order)" class="text-xs text-red-300 hover:text-red-500 border border-red-100 hover:border-red-300 px-3 py-1.5 rounded-lg ml-auto transition">🗑 刪除</button>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- ── 品項狀態 ── -->
    <div x-show="tab==='inventory' && store.store_id">
      <div class="flex items-center gap-2 mb-6">
        <h2 class="font-bold text-lg">品項訂單狀態</h2>
        <div class="flex items-center gap-1 ml-4">
          <button @click="shiftInventoryDate(-1)" class="w-7 h-7 border border-gray-200 rounded-lg text-gray-500 hover:bg-gray-100 text-sm">‹</button>
          <input type="date" x-model="inventoryDate" @change="loadInventory()"
            class="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
          <button @click="shiftInventoryDate(1)" class="w-7 h-7 border border-gray-200 rounded-lg text-gray-500 hover:bg-gray-100 text-sm">›</button>
        </div>
        <button @click="loadInventory()" class="text-sm text-orange-500 hover:text-orange-600 ml-auto">↻ 重新整理</button>
      </div>

      <div x-show="inventoryLoading" class="text-center py-12 text-gray-400">載入中...</div>
      <div x-show="!inventoryLoading && (!inventoryData.items || inventoryData.items.length===0)" class="text-center py-12 text-gray-400">
        <p class="text-4xl mb-3">📦</p><p class="text-sm">還沒有商品</p>
      </div>

      <template x-if="inventoryData.items && inventoryData.items.length > 0">
        <div>
          <!-- 日期標題 + 總覽 -->
          <div class="bg-orange-50 rounded-2xl p-4 mb-5 flex flex-wrap gap-6">
            <div>
              <p class="text-xs text-gray-500">查詢日期</p>
              <p class="font-bold text-orange-600" x-text="inventoryData.date"></p>
            </div>
            <div>
              <p class="text-xs text-gray-500">待確認總量</p>
              <p class="font-bold text-yellow-600" x-text="inventoryData.items.reduce((s,i)=>s+i.pending_qty,0) + ' 份'"></p>
            </div>
            <div>
              <p class="text-xs text-gray-500">已接受總量</p>
              <p class="font-bold text-blue-600" x-text="inventoryData.items.reduce((s,i)=>s+i.accepted_qty,0) + ' 份'"></p>
            </div>
            <div>
              <p class="text-xs text-gray-500">已完成總量</p>
              <p class="font-bold text-green-600" x-text="inventoryData.items.reduce((s,i)=>s+i.completed_qty,0) + ' 份'"></p>
            </div>
          </div>

          <!-- 品項表格 -->
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-gray-50 text-gray-500 text-xs">
                  <th class="text-left px-5 py-3 font-semibold">商品</th>
                  <th class="text-center px-3 py-3 font-semibold">
                    <span class="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">待確認</span>
                  </th>
                  <th class="text-center px-3 py-3 font-semibold">
                    <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">已接受</span>
                  </th>
                  <th class="text-center px-3 py-3 font-semibold">
                    <span class="bg-green-100 text-green-700 px-2 py-0.5 rounded-full">已完成</span>
                  </th>
                  <th class="text-center px-3 py-3 font-semibold text-gray-600">合計</th>
                  <th class="text-center px-3 py-3 font-semibold text-gray-600">剩餘庫存</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="item in inventoryData.items" :key="item.product_id">
                  <tr class="border-t border-gray-50 hover:bg-gray-50/50">
                    <td class="px-5 py-3">
                      <p class="font-medium text-gray-800" x-text="item.name"></p>
                      <p class="text-xs text-gray-400" x-text="item.category || ''"></p>
                    </td>
                    <td class="text-center px-3 py-3">
                      <span class="font-bold text-yellow-600" x-text="item.pending_qty || '—'"></span>
                    </td>
                    <td class="text-center px-3 py-3">
                      <span class="font-bold text-blue-600" x-text="item.accepted_qty || '—'"></span>
                    </td>
                    <td class="text-center px-3 py-3">
                      <span class="font-bold text-green-600" x-text="item.completed_qty || '—'"></span>
                    </td>
                    <td class="text-center px-3 py-3">
                      <span class="font-bold text-gray-700" x-text="item.total_qty || 0"></span>
                    </td>
                    <td class="text-center px-3 py-3">
                      <template x-if="item.has_stock_limit">
                        <span :class="(item.current_stock||0)<=3?'text-red-500 font-bold':'text-gray-600'"
                          x-text="(item.current_stock??'—')+' / '+(item.stock_limit??'—')"></span>
                      </template>
                      <template x-if="!item.has_stock_limit">
                        <span class="text-gray-300 text-xs">無限制</span>
                      </template>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </template>
    </div>

    <!-- ── 菜單管理 ── -->
    <div x-show="tab==='menu' && store.store_id">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-lg">商品列表</h2>
        <button @click="openProductForm(null)" class="bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-orange-600">+ 新增商品</button>
      </div>
      <div class="flex gap-2 mb-5 flex-wrap">
        <template x-for="f in [{k:'active',l:'供應中'},{k:'soldout',l:'售完'},{k:'inactive',l:'已下架'},{k:'all',l:'全部'}]" :key="f.k">
          <button @click="productFilter=f.k"
            :class="productFilter===f.k?'bg-orange-500 text-white':'bg-white text-gray-600 border border-gray-200'"
            class="px-3 py-1.5 rounded-lg text-xs font-medium" x-text="f.l"></button>
        </template>
      </div>
      <div x-show="filteredProducts.length===0" class="text-center py-12 text-gray-400">
        <p class="text-4xl mb-3">🍽️</p><p class="text-sm">沒有符合的商品</p>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <template x-for="product in filteredProducts" :key="product.product_id">
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
               :class="product.is_active===false ? 'opacity-60' : ''">
            <div class="h-32 bg-orange-50 flex items-center justify-center overflow-hidden">
              <template x-if="product.image_url">
                <img :src="product.image_url" class="w-full h-full object-cover">
              </template>
              <template x-if="!product.image_url">
                <span class="text-4xl">🍱</span>
              </template>
            </div>
            <div class="p-4">
              <div class="flex items-start justify-between mb-1">
                <h4 class="font-semibold text-gray-800 text-sm" x-text="product.name"></h4>
                <span class="text-xs px-2 py-0.5 rounded-full ml-1 flex-shrink-0"
                  :class="product.is_active===false ? 'bg-gray-100 text-gray-400' : product.in_stock ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-500'"
                  x-text="product.is_active===false ? '已下架' : product.in_stock ? '供應中' : '售完'"></span>
              </div>
              <p class="text-orange-500 font-bold text-sm mb-1" x-text="'$'+product.price"></p>
              <template x-if="product.has_stock_limit">
                <p class="text-xs text-blue-400 mb-1" x-text="'剩 '+(product.current_stock??'—')+' / '+(product.stock_limit??'—')+' 份'"></p>
              </template>
              <template x-if="product.allow_waitlist">
                <p class="text-xs text-purple-400 mb-1">開放候補</p>
              </template>
              <template x-if="product.pickup_start||product.pickup_end">
                <p class="text-xs text-gray-400 mb-2" x-text="'取貨：'+(product.pickup_start||'—')+'~'+(product.pickup_end||'—')"></p>
              </template>
              <div class="flex gap-2 mt-2">
                <button @click="openProductForm(product)" class="flex-1 text-xs border border-gray-200 py-1.5 rounded-lg hover:bg-gray-50">編輯</button>
                <template x-if="product.is_active!==false">
                  <button @click="toggleStock(product)" class="text-xs border py-1.5 px-2 rounded-lg"
                    :class="product.in_stock?'border-red-200 text-red-400 hover:bg-red-50':'border-green-200 text-green-500 hover:bg-green-50'"
                    x-text="product.in_stock?'售完':'補貨'"></button>
                </template>
                <button @click="toggleActive(product)" class="text-xs border py-1.5 px-2 rounded-lg"
                  :class="product.is_active===false?'border-green-200 text-green-500 hover:bg-green-50':'border-gray-200 text-gray-400 hover:bg-gray-50'"
                  x-text="product.is_active===false?'上架':'下架'"></button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- ── 候補管理 ── -->
    <div x-show="tab==='waitlist' && store.store_id">
      <!-- 篩選 tab -->
      <div class="flex gap-2 mb-4">
        <template x-for="f in [{k:'active',l:'進行中'},{k:'cancelled',l:'已取消'},{k:'all',l:'全部'}]" :key="f.k">
          <button @click="waitlistFilter=f.k"
            :class="waitlistFilter===f.k?'bg-orange-500 text-white':'bg-white text-gray-600 border border-gray-200'"
            class="px-3 py-1.5 rounded-lg text-xs font-medium" x-text="f.l"></button>
        </template>
      </div>

      <div x-show="waitlistLoading" class="text-center py-12 text-gray-400">載入中...</div>
      <div x-show="!waitlistLoading && filteredWaitlist.length===0" class="text-center py-12 text-gray-400">
        <p class="text-4xl mb-3">⏳</p><p class="text-sm">沒有符合的候補記錄</p>
      </div>
      <div class="flex flex-col gap-4">
        <template x-for="entry in filteredWaitlist" :key="entry.waitlist_id">
          <div class="bg-white rounded-2xl border shadow-sm p-5"
               :class="entry.status==='waiting'?'border-blue-200 ring-1 ring-blue-100':entry.status==='cancelled'?'opacity-60 border-gray-100':'border-gray-100'">
            <div class="flex items-start justify-between mb-3">
              <div>
                <p class="font-bold text-base" x-text="entry.product_name"></p>
                <p class="text-xs text-gray-400" x-text="formatDate(entry.created_at)"></p>
                <p class="text-xs text-gray-500 mt-1">
                  數量：<span class="font-medium" x-text="entry.qty + ' 份'"></span>
                </p>
                <p class="text-xs text-gray-500">
                  聯絡：<span x-text="(entry.contact_name||'—') + '  ' + (entry.contact_phone||'—')"></span>
                </p>
                <template x-if="entry.pickup_date">
                  <p class="text-xs text-blue-400 mt-0.5"
                     x-text="'取貨：'+entry.pickup_date+(entry.pickup_hour!=null?' '+entry.pickup_hour+':00~'+(entry.pickup_hour+1)+':00':'')"></p>
                </template>
                <template x-if="entry.status==='cancelled' && entry.updated_at">
                  <p class="text-xs text-gray-400 mt-0.5" x-text="'取消於：'+formatDate(entry.updated_at)"></p>
                </template>
              </div>
              <span class="text-xs font-bold px-3 py-1 rounded-full flex-shrink-0"
                :class="{
                  'bg-blue-100 text-blue-600': entry.status==='waiting',
                  'bg-green-100 text-green-600': entry.status==='confirmed',
                  'bg-gray-100 text-gray-400': entry.status==='cancelled',
                  'bg-orange-100 text-orange-600': entry.status==='converted'
                }"
                x-text="{'waiting':'候補中','confirmed':'已確認','cancelled':'已取消','converted':'已轉訂單'}[entry.status]||entry.status">
              </span>
            </div>
            <template x-if="entry.status==='waiting' || entry.status==='confirmed'">
              <div class="flex gap-2">
                <button @click="convertWaitlist(entry)"
                  class="flex-1 bg-orange-500 text-white py-2 rounded-xl text-sm font-medium hover:bg-orange-600">
                  轉為正式訂單
                </button>
                <button @click="cancelWaitlistEntry(entry)"
                  class="px-4 border border-gray-200 text-gray-500 py-2 rounded-xl text-sm hover:bg-gray-50">
                  取消候補
                </button>
              </div>
            </template>
            <template x-if="entry.status==='cancelled'">
              <div class="flex justify-end">
                <button @click="deleteWaitlistEntry(entry)"
                  :disabled="!canDeleteWaitlist(entry)"
                  :title="canDeleteWaitlist(entry) ? '刪除' : '取消後滿7天才能刪除'"
                  class="text-xs border px-3 py-1.5 rounded-lg transition"
                  :class="canDeleteWaitlist(entry)
                    ? 'text-red-400 border-red-200 hover:bg-red-50'
                    : 'text-gray-300 border-gray-100 cursor-not-allowed'">

  <!-- Reject Modal -->

      <textarea x-model="rejectReason" rows="3" placeholder="買家會看到此原因"

  <div x-show="showProductForm" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-md w-full max-h-[92vh] overflow-y-auto">
      <h3 class="font-bold text-lg mb-4" x-text="editProduct?'編輯商品':'新增商品'"></h3>
      <div class="flex flex-col gap-4">

        <!-- 商品圖片 -->
        <div>
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 block">商品圖片</label>
          <div class="flex items-center gap-4">
            <div class="w-20 h-20 rounded-xl bg-orange-50 border-2 border-dashed border-orange-200 flex items-center justify-center overflow-hidden flex-shrink-0">
              <template x-if="productForm.image_url">
                <img :src="productForm.image_url" class="w-full h-full object-cover">

            </div>
            <div>
              <input type="file" accept="image/*" @change="uploadProductImage($event)" class="hidden" id="productImageInput">
              <label for="productImageInput" class="cursor-pointer bg-orange-50 text-orange-500 border border-orange-200 px-4 py-2 rounded-xl text-sm font-medium hover:bg-orange-100 block text-center">
                <span x-show="!uploadingProductImage">上傳圖片</span>

              </label>
              <p class="text-xs text-gray-400 mt-1">JPG / PNG / WebP，最大 5MB</p>
            </div>

        </div>

        <!-- 基本資料 -->
        <div>
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 block">基本資料</label>
          <div class="flex flex-col gap-3">
            <div>
              <label class="text-sm text-gray-700 mb-1 block">商品名稱 *</label>
              <input x-model="productForm.name" type="text" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
            </div>
            <div>
              <label class="text-sm text-gray-700 mb-1 block">價格 *</label>
              <input x-model="productForm.price" type="number" min="1" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
            </div>
            <div>
              <label class="text-sm text-gray-700 mb-1 block">描述</label>
              <textarea x-model="productForm.description" rows="2" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-orange-300"></textarea>
            </div>
            <div>
              <label class="text-sm text-gray-700 mb-1 block">分類</label>
              <input x-model="productForm.category" type="text" placeholder="如：主食、飲料" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
            </div>
          </div>
        </div>

        <!-- 數量限制 -->
        <div class="border-t pt-4">
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3 block">數量限制</label>
          <label class="flex items-center gap-3 cursor-pointer mb-3">
            <input type="checkbox" x-model="productForm.has_stock_limit" class="w-4 h-4 accent-orange-500">
            <span class="text-sm text-gray-700">啟用數量限制</span>
          </label>
          <template x-if="productForm.has_stock_limit">
            <div class="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label class="text-xs text-gray-500 mb-1 block">每日上限數量</label>
                <input x-model="productForm.stock_limit" type="number" min="1" placeholder="例：50"
                  class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
              </div>
              <div>
                <label class="text-xs text-gray-500 mb-1 block">目前剩餘數量</label>
                <input x-model="productForm.current_stock" type="number" min="0" placeholder="例：50"
                  class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
              </div>
            </div>
          </template>
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" x-model="productForm.allow_waitlist" class="w-4 h-4 accent-purple-500">
            <span class="text-sm text-gray-700">售完後開放候補</span>

        </div>

        <!-- 每人限購 -->
        <div class="border-t pt-4">
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3 block">每人限購</label>

            <input x-model="productForm.max_per_person" type="number" min="1" placeholder="不限"
              class="w-32 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
            <span class="text-sm text-gray-500">份（留空表示不限）</span>
          </div>
        </div>

        <!-- 販售區間 -->
        <div class="border-t pt-4">
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3 block">販售區間</label>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-gray-500 mb-1 block">開始日期</label>
              <input x-model="productForm.sale_start" type="date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">

              <label class="text-xs text-gray-500 mb-1 block">結束日期</label>

            </div>

        <!-- 取貨區間 -->
        <div class="border-t pt-4">
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3 block">取貨區間</label>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="text-xs text-gray-500 mb-1 block">可取貨開始日</label>
              <input x-model="productForm.pickup_start" type="date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
            </div>
            <div>
              <label class="text-xs text-gray-500 mb-1 block">可取貨結束日</label>
              <input x-model="productForm.pickup_end" type="date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
            </div>

                <template x-for="h in Array.from({length:24},(_,i)=>i)" :key="h">
                  <option :value="h" x-text="h+':00'"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="text-xs text-gray-500 mb-1 block">取貨結束時段</label>
              <select x-model="productForm.pickup_hours_end" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
                <template x-for="h in Array.from({length:24},(_,i)=>i+1)" :key="h">
                  <option :value="h" x-text="h+':00'"></option>

      <div class="flex gap-3 mt-6">

          <span x-show="!saving">儲存</span>
          <span x-show="saving">儲存中...</span>

</div>

<script>
function merchantPage() {
  return {
    user: JSON.parse(localStorage.getItem('user') || 'null'),
    store: {}, orders: [], products: [], waitlistEntries: [],
    waitlistFilter: 'active',
    inventoryData: {},
    waitlistLoading: false,
    inventoryDate: new Date().toLocaleDateString('en-CA'),
    orderDateFilter: new Date().toLocaleDateString('en-CA'),
    tab: 'orders',
    orderFilter: 'all',
    productFilter: 'active',
    loading: true, ordersLoading: false, inventoryLoading: false,
    saving: false, saveMsg: '',
    uploadingLogo: false, uploadingProductImage: false,
    storeForm: {}, productForm: {},
    editProduct: null, showProductForm: false,
    showRejectModal: false, rejectReason: '', rejectTarget: null,

    get filteredProducts() {
      if (this.productFilter === 'all') return this.products;
      if (this.productFilter === 'active') return this.products.filter(p => p.is_active !== false && p.in_stock);
      if (this.productFilter === 'soldout') return this.products.filter(p => p.is_active !== false && !p.in_stock);
      if (this.productFilter === 'inactive') return this.products.filter(p => p.is_active === false);
      return this.products;
    },

    shiftOrderDate(delta) {
      const [y, m, day] = (this.orderDateFilter || new Date().toLocaleDateString('en-CA')).split('-').map(Number);
      const d = new Date(y, m - 1, day + delta);
      this.orderDateFilter = d.toLocaleDateString('en-CA');
      this.loadOrders();
    },

    shiftInventoryDate(delta) {
      const [y, m, day] = this.inventoryDate.split('-').map(Number);
      const d = new Date(y, m - 1, day + delta);
      this.inventoryDate = d.toLocaleDateString('en-CA');
      this.loadInventory();
    },

    async init() {
      await initFirebase();
      firebase.auth().onAuthStateChanged(async (fbUser) => {
        if (!fbUser) { window.location.href = '/'; return; }
        const token = await fbUser.getIdToken();
        this.user = await syncUser(token);
        await this.loadStore();
      });
    },

    async loadStore() {
      this.loading = true;
      try {
        const mine = await apiCall('GET', '/stores/mine');
        if (mine && mine.store_id) {
          this.store = mine;
          this.storeForm = { name: mine.name, description: mine.description, category: mine.category, address: mine.address, phone: mine.phone, logo_url: mine.logo_url };
          await Promise.all([this.loadOrders(), this.loadProducts()]);
        }
      } catch(e) { console.error(e); }
      finally { this.loading = false; }
    },

    async loadOrders() {
      if (!this.store.store_id) return;
      this.ordersLoading = true;
      try {
        const params = this.orderDateFilter ? `?date=${this.orderDateFilter}` : '';
        this.orders = await apiCall('GET', `/orders/store/${this.store.store_id}${params}`);
      } catch(e) { console.error(e); }
      finally { this.ordersLoading = false; }
    },

    async loadProducts() {
      if (!this.store.store_id) return;
      const res = await fetch(`/api/v1/stores/${this.store.store_id}/products`);
      if (res.ok) this.products = await res.json();
    },

    async loadInventory() {
      if (!this.store.store_id) return;
      this.inventoryLoading = true;
      try {
        const params = this.inventoryDate ? `?date=${this.inventoryDate}` : '';
        this.inventoryData = await apiCall('GET', `/orders/store/${this.store.store_id}/inventory${params}`);
      } catch(e) { console.error(e); }
      finally { this.inventoryLoading = false; }
    },

    get pendingCount() { return this.orders.filter(o => o.status === 'pending').length; },
    get filteredOrders() {
      const list = this.orderFilter === 'all'
        ? [...this.orders]
        : this.orders.filter(o => o.status === this.orderFilter);
      return list.sort((a, b) => {
        const ta = a.created_at ? new Date(a.created_at).getTime() : 0;
        const tb = b.created_at ? new Date(b.created_at).getTime() : 0;
        return tb - ta;
      });
    },

    async toggleOpen() {
      await apiCall('PATCH', `/stores/${this.store.store_id}`, { is_open: this.store.is_open });
    },

    async uploadStoreLogo(event) {
      const file = event.target.files[0];
      if (!file) return;
      this.uploadingLogo = true;
      try {
        const url = await uploadImage(file, `stores/${this.store.store_id || 'new'}/logo_${Date.now()}`);
        this.storeForm.logo_url = url;
        if (this.store.store_id) {
          await apiCall('PATCH', `/stores/${this.store.store_id}`, { logo_url: url });
          this.store.logo_url = url;
        }
      } catch(e) { alert('上傳失敗：' + e.message); }
      finally { this.uploadingLogo = false; }
    },

    async uploadProductImage(event) {
      const file = event.target.files[0];
      if (!file) return;
      this.uploadingProductImage = true;
      try {
        const pid = this.editProduct?.product_id || 'new_' + Date.now();
        const url = await uploadImage(file, `stores/${this.store.store_id}/products/${pid}_${Date.now()}`);
        this.productForm.image_url = url;
      } catch(e) { alert('上傳失敗：' + e.message); }
      finally { this.uploadingProductImage = false; }
    },

    async updateStatus(order, newStatus, reason = null) {
      try {
        await apiCall('PATCH', `/orders/${order.order_id}/status`, { status: newStatus, reason });
        await this.loadOrders();
      } catch(e) { alert('操作失敗：' + e.message); }
    },

    rejectOrder(order) { this.rejectTarget = order; this.rejectReason = ''; this.showRejectModal = true; },
    async confirmReject() {
      await this.updateStatus(this.rejectTarget, 'cancelled', this.rejectReason);
      this.showRejectModal = false; this.rejectTarget = null;
    },

    async deleteOrder(order) {
      if (!confirm(`確定刪除訂單 #${order.order_id.slice(-6).toUpperCase()}？`)) return;
      try { await apiCall('DELETE', `/orders/${order.order_id}`); await this.loadOrders(); }
      catch(e) { alert('刪除失敗：' + e.message); }
    },

    async saveStore() {
      this.saving = true; this.saveMsg = '';
      try {
        if (this.store.store_id) {
          await apiCall('PATCH', `/stores/${this.store.store_id}`, this.storeForm);
          this.saveMsg = '已儲存！';
        } else {
          this.store = await apiCall('POST', '/stores', this.storeForm);
          this.saveMsg = '申請已送出，等待審核';
        }
        setTimeout(() => this.saveMsg = '', 3000);
      } catch(e) { alert(e.message); }
      finally { this.saving = false; }
    },

    openProductForm(product) {
      this.editProduct = product;
      this.productForm = product ? {
        name: product.name, price: product.price,
        description: product.description, category: product.category,
        image_url: product.image_url || '',
        has_stock_limit: product.has_stock_limit || false,
        stock_limit: product.stock_limit, current_stock: product.current_stock,
        allow_waitlist: product.allow_waitlist || false,
        sale_start: product.sale_start || '', sale_end: product.sale_end || '',
        pickup_start: product.pickup_start || '', pickup_end: product.pickup_end || '',
        pickup_hours_start: product.pickup_hours_start ?? 9,
        pickup_hours_end: product.pickup_hours_end ?? 18,
        max_per_person: product.max_per_person || '',
      } : { has_stock_limit: false, allow_waitlist: false, pickup_hours_start: 9, pickup_hours_end: 18, max_per_person: '' };
      this.showProductForm = true;
    },

    async saveProduct() {
      if (!this.productForm.name || !this.productForm.price) { alert('請填寫名稱與價格'); return; }
      this.saving = true;
      try {
        const payload = {
          ...this.productForm,
          price: parseFloat(this.productForm.price),
          stock_limit: this.productForm.stock_limit ? parseInt(this.productForm.stock_limit) : null,
          current_stock: this.productForm.current_stock != null ? parseInt(this.productForm.current_stock) : null,
          pickup_hours_start: parseInt(this.productForm.pickup_hours_start),
          pickup_hours_end: parseInt(this.productForm.pickup_hours_end),
          max_per_person: this.productForm.max_per_person ? parseInt(this.productForm.max_per_person) : null,
          options: [],
        };
        if (this.editProduct)
          await apiCall('PATCH', `/stores/${this.store.store_id}/products/${this.editProduct.product_id}`, payload);
        else
          await apiCall('POST', `/stores/${this.store.store_id}/products`, { ...payload, in_stock: true });
        await this.loadProducts();
        this.showProductForm = false;
      } catch(e) { alert(e.message); }
      finally { this.saving = false; }
    },

    async loadWaitlist() {
      if (!this.store.store_id) return;
      this.waitlistLoading = true;
      try {
        this.waitlistEntries = await apiCall('GET', `/waitlist/store/${this.store.store_id}`);
      } catch(e) { console.error(e); }
      finally { this.waitlistLoading = false; }
    },

    async convertWaitlist(entry) {
      if (!confirm(`確定將「${entry.product_name}」候補單轉為正式訂單？`)) return;
      try {
        await apiCall('POST', `/waitlist/${entry.waitlist_id}/convert`);
        await Promise.all([this.loadWaitlist(), this.loadOrders()]);
        alert('已成功轉為正式訂單！');
      } catch(e) { alert('操作失敗：' + e.message); }
    },

    async cancelWaitlistEntry(entry) {
      if (!confirm('確定取消此候補申請？')) return;
      try {
        await apiCall('PATCH', `/waitlist/${entry.waitlist_id}`, { status: 'cancelled' });
        await this.loadWaitlist();
      } catch(e) { alert('操作失敗：' + e.message); }
    },

    async toggleStock(product) {
      try {
        await apiCall('PATCH', `/stores/${this.store.store_id}/products/${product.product_id}`, { in_stock: !product.in_stock });
        await this.loadProducts();
      } catch(e) { alert('操作失敗：' + e.message); }
    },

    async toggleActive(product) {
      try {
        const newActive = product.is_active === false ? true : false;
        await apiCall('PATCH', `/stores/${this.store.store_id}/products/${product.product_id}`, { is_active: newActive });
        await this.loadProducts();
        // 下架後自動切換到「已下架」篩選，讓商家看到結果
        if (!newActive) this.productFilter = 'inactive';
      } catch(e) { alert('操作失敗：' + e.message); }
    },

    get filteredWaitlist() {
      if (this.waitlistFilter === 'active')
        return this.waitlistEntries.filter(w => ['waiting','confirmed'].includes(w.status));
      if (this.waitlistFilter === 'cancelled')
        return this.waitlistEntries.filter(w => w.status === 'cancelled');
      return this.waitlistEntries;
    },

    canDeleteWaitlist(entry) {
      if (entry.status !== 'cancelled') return false;
      const updated = entry.updated_at;
      if (!updated) return true;
      const age = (Date.now() - new Date(updated).getTime()) / 86400000;
      return age >= 7;
    },

    daysUntilDeletable(entry) {
      const updated = entry.updated_at;
      if (!updated) return 0;
      const age = (Date.now() - new Date(updated).getTime()) / 86400000;
      return Math.max(0, Math.ceil(7 - age));
    },

    async deleteWaitlistEntry(entry) {
      if (!confirm('確定刪除此候補單？')) return;
      try {
        await apiCall('DELETE', `/waitlist/${entry.waitlist_id}`);
        await this.loadWaitlist();
      } catch(e) { alert('刪除失敗：' + e.message); }
    },

    filterLabel(f) {
      return { all:'全部', pending:'待確認', accepted:'已接受', preparing:'製作中', ready:'可取餐', completed:'已完成', cancelled:'已取消' }[f] || f;
    },
    statusStyle(status) {
      const m = { pending:{label:'待確認',cls:'bg-yellow-100 text-yellow-700'}, accepted:{label:'已接受',cls:'bg-blue-100 text-blue-700'}, preparing:{label:'製作中',cls:'bg-indigo-100 text-indigo-700'}, ready:{label:'可取餐 🔔',cls:'bg-green-100 text-green-700'}, completed:{label:'已完成',cls:'bg-gray-100 text-gray-600'}, cancelled:{label:'已取消',cls:'bg-red-100 text-red-500'}, cancel_requested:{label:'取消審核中',cls:'bg-orange-100 text-orange-600'} };
      return m[status] || { label: status, cls: 'bg-gray-100 text-gray-500' };
    },
    formatDate(ts) {
      if (!ts) return '';
      const d = ts._seconds ? new Date(ts._seconds * 1000) : new Date(ts);
      return d.toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    },
  };
}
</script>
